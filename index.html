<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Search Platform</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background-color:#f5f5f5; }
    .app-container { max-width:1000px; margin:0 auto; padding:20px; text-align:center; }
    h1 { color:#333; }
    .search-bar { padding:10px; width:80%; max-width:400px; margin-bottom:20px; border-radius:8px; border:1px solid #ccc; }
    .games-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap:20px; }
    .game-card { background:#fff; border-radius:10px; padding:15px; box-shadow:0 4px 6px rgba(0,0,0,0.1); }
    .game-card img { width:100%; border-radius:8px; }
    .download-button { display:inline-block; margin-top:10px; padding:8px 12px; background-color:#4CAF50; color:#fff; text-decoration:none; border-radius:6px; }
    .download-button:hover { background-color:#45a049; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="app.js"></script>
</body>
</html>
